<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Monny Bird</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Monny Bird">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%;
  height: 100%;
  background: #1a0a2e;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
  overflow: hidden;
  touch-action: none;
  user-select: none;
}
h1 {
  color: #ffdd00;
  font-size: 28px;
  text-shadow: 3px 3px 0 #ff6600, 6px 6px 0 #c40000;
  margin-bottom: 10px;
  letter-spacing: 2px;
}
#gameWrap {
  position: relative;
}
canvas {
  display: block;
  border: 4px solid #ffdd00;
  border-radius: 8px;
  box-shadow: 0 0 30px #ff6600aa, 0 0 60px #ff000055;
}
#ui {
  display: flex;
  justify-content: space-between;
  width: 100%;
  margin-top: 10px;
  color: #ffdd00;
  font-size: 18px;
  text-shadow: 2px 2px 0 #000;
}
#installBtn {
  display: none;
  margin-top: 10px;
  padding: 10px 24px;
  background: #ffdd00;
  border: none;
  border-radius: 20px;
  font-family: inherit;
  font-size: 16px;
  font-weight: bold;
  color: #1a0a2e;
  cursor: pointer;
  box-shadow: 0 4px 15px #ffdd0099;
}
#installBtn:hover { background: #fff; }
</style>
</head>
<body>
<h1>🐦 MONNY BIRD 🐦</h1>
<div id="gameWrap">
  <canvas id="c"></canvas>
  <div id="ui">
    <span id="scoreDisplay">Score: 0</span>
    <span id="bestDisplay">Best: 0</span>
  </div>
</div>
<button id="installBtn">📱 Add to Home Screen</button>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const W = 360, H = 600;
canvas.width  = W;
canvas.height = H;

const GRAVITY      = 0.25;
const FLAP_POWER   = -6.0;
const MAX_FALL     = 10;
const PIPE_WIDTH   = 60;
const PIPE_GAP     = 150;
const PIPE_SPEED   = 2.0;
const PIPE_INTERVAL= 100;
const GROUND_H     = 60;

const SKY_TOP    = '#1a0a2e';
const SKY_BOT    = '#3a0a5e';
const STAR_COL   = '#ffffff';
const PIPE_COL   = '#00cc44';
const PIPE_DARK  = '#009933';
const PIPE_LIGHT = '#66ff88';
const GROUND_COL = '#8B4513';
const GROUND_TOP = '#228B22';

let state = 'idle';
let score = 0;
let best  = parseInt(localStorage.getItem('monnyBest') || '0');
let frame = 0;

let bird = {};
let pipes = [];
let stars = [];
let particles = [];

function resetBird() {
  bird = {
    x: 80,
    y: H / 2 - 20,
    vy: 0,
    w: 38,
    h: 30,
    angle: 0,
    alive: true,
    flapAnim: 0
  };
}

function initStars() {
  stars = [];
  for (let i = 0; i < 60; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * (H - GROUND_H),
      r: Math.random() * 1.5 + 0.3,
      twinkle: Math.random() * Math.PI * 2
    });
  }
}

function resetGame() {
  score = 0;
  frame = 0;
  pipes = [];
  particles = [];
  resetBird();
  updateUI();
}

function updateUI() {
  document.getElementById('scoreDisplay').textContent = 'Score: ' + score;
  document.getElementById('bestDisplay').textContent  = 'Best: '  + best;
}

function flap() {
  if (state === 'idle') {
    state = 'playing';
    resetGame();
    bird.vy = FLAP_POWER;
    return;
  }
  if (state === 'dead') {
    state = 'idle';
    return;
  }
  if (state === 'playing' && bird.alive) {
    bird.vy = FLAP_POWER;
    bird.flapAnim = 8;
  }
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); flap(); }
});
canvas.addEventListener('pointerdown', e => { e.preventDefault(); flap(); });

function spawnPipe() {
  const minTop = 60;
  const maxTop = H - GROUND_H - PIPE_GAP - 60;
  const topH   = Math.random() * (maxTop - minTop) + minTop;
  pipes.push({ x: W + 10, topH, scored: false });
}

function collidesWithPipe(b, p) {
  const pad = 6;
  const bx1 = b.x - b.w / 2 + pad;
  const bx2 = b.x + b.w / 2 - pad;
  const by1 = b.y - b.h / 2 + pad;
  const by2 = b.y + b.h / 2 - pad;

  const px1 = p.x;
  const px2 = p.x + PIPE_WIDTH;

  if (bx2 < px1 || bx1 > px2) return false;
  if (by1 < p.topH) return true;
  if (by2 > p.topH + PIPE_GAP) return true;
  return false;
}

function spawnParticles(x, y) {
  const colors = ['#ffdd00','#ff6600','#ff0000','#ffffff','#ff88cc'];
  for (let i = 0; i < 22; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 6 + 2;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      life: 1,
      decay: Math.random() * 0.03 + 0.02,
      r: Math.random() * 5 + 2,
      col: colors[Math.floor(Math.random() * colors.length)]
    });
  }
}

function update() {
  frame++;

  stars.forEach(s => s.twinkle += 0.05);

  particles.forEach(p => {
    p.x  += p.vx;
    p.y  += p.vy;
    p.vy += 0.2;
    p.life -= p.decay;
  });
  particles = particles.filter(p => p.life > 0);

  if (state !== 'playing') return;

  bird.vy += GRAVITY;
  if (bird.vy > MAX_FALL) bird.vy = MAX_FALL;
  bird.y  += bird.vy;
  bird.angle = Math.min(Math.max(bird.vy * 4.5, -25), 90);
  if (bird.flapAnim > 0) bird.flapAnim--;

  if (frame % PIPE_INTERVAL === 0) spawnPipe();
  pipes.forEach(p => p.x -= PIPE_SPEED);
  pipes = pipes.filter(p => p.x + PIPE_WIDTH > -20);

  pipes.forEach(p => {
    if (!p.scored && p.x + PIPE_WIDTH < bird.x) {
      p.scored = true;
      score++;
      if (score > best) {
        best = score;
        localStorage.setItem('monnyBest', best);
      }
      updateUI();
    }
  });

  for (const p of pipes) {
    if (collidesWithPipe(bird, p)) { die(); return; }
  }

  if (bird.y + bird.h / 2 >= H - GROUND_H || bird.y - bird.h / 2 <= 0) {
    die();
  }
}

function die() {
  bird.alive = false;
  state = 'dead';
  spawnParticles(bird.x, bird.y);
}

function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, H - GROUND_H);
  grad.addColorStop(0, SKY_TOP);
  grad.addColorStop(1, SKY_BOT);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H - GROUND_H);

  stars.forEach(s => {
    const alpha = 0.5 + 0.5 * Math.sin(s.twinkle);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = STAR_COL;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  ctx.fillStyle = '#fffbe0';
  ctx.beginPath();
  ctx.arc(W - 55, 55, 28, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = SKY_TOP;
  ctx.beginPath();
  ctx.arc(W - 43, 48, 24, 0, Math.PI * 2);
  ctx.fill();

  // Draw giant face in the background sky
  if (faceImg.complete && faceImg.naturalWidth > 0) {
    ctx.save();
    ctx.globalAlpha = 0.12;
    ctx.beginPath();
    ctx.arc(W / 2, (H - 60) / 2, 160, 0, Math.PI * 2);
    ctx.clip();
    ctx.drawImage(faceImg, W / 2 - 160, (H - 60) / 2 - 160, 320, 320);
    ctx.restore();
    ctx.globalAlpha = 1;
  }
}

function drawGround() {
  ctx.fillStyle = GROUND_COL;
  ctx.fillRect(0, H - GROUND_H, W, GROUND_H);
  ctx.fillStyle = GROUND_TOP;
  ctx.fillRect(0, H - GROUND_H, W, 12);
  ctx.fillStyle = '#1a6b1a';
  for (let x = 5; x < W; x += 18) {
    ctx.beginPath();
    ctx.arc(x, H - GROUND_H + 6, 5, Math.PI, 0);
    ctx.fill();
  }
}

function drawPipe(p) {
  const capH = 18, capExtra = 6;

  const botY  = p.topH + PIPE_GAP;
  const botH  = H - GROUND_H - botY;

  ctx.fillStyle = PIPE_COL;
  ctx.fillRect(p.x, botY + capH, PIPE_WIDTH, botH - capH);
  ctx.fillStyle = PIPE_DARK;
  ctx.fillRect(p.x - capExtra, botY, PIPE_WIDTH + capExtra * 2, capH);
  ctx.fillStyle = PIPE_LIGHT;
  ctx.fillRect(p.x + 6, botY + capH + 4, 8, botH - capH - 8);

  ctx.fillStyle = PIPE_COL;
  ctx.fillRect(p.x, 0, PIPE_WIDTH, p.topH - capH);
  ctx.fillStyle = PIPE_DARK;
  ctx.fillRect(p.x - capExtra, p.topH - capH, PIPE_WIDTH + capExtra * 2, capH);
  ctx.fillStyle = PIPE_LIGHT;
  ctx.fillRect(p.x + 6, 4, 8, p.topH - capH - 8);
}

function drawBird() {
  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate((bird.angle * Math.PI) / 180);

  const w = bird.w, h = bird.h;
  const flapOffset = bird.flapAnim > 0 ? -4 : 0;

  // Body
  ctx.fillStyle = '#ffcc00';
  ctx.beginPath();
  ctx.ellipse(0, 0, w / 2, h / 2, 0, 0, Math.PI * 2);
  ctx.fill();

  // Wing
  ctx.fillStyle = '#ff9900';
  ctx.beginPath();
  ctx.ellipse(-4, flapOffset, w / 3, h / 4, -0.3, 0, Math.PI * 2);
  ctx.fill();

  // Belly
  ctx.fillStyle = '#ffe066';
  ctx.beginPath();
  ctx.ellipse(4, 4, w / 4, h / 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Draw face image as a circular clip over the bird's head
  if (faceImg.complete && faceImg.naturalWidth > 0) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(0, -2, 24, 0, Math.PI * 2);
    ctx.clip();
    ctx.drawImage(faceImg, -22, -26, 48, 48);
    ctx.restore();
  } else {
    // Eye white
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(10, -6, 7, 0, Math.PI * 2);
    ctx.fill();

    // Pupil
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(12, -5, 3.5, 0, Math.PI * 2);
    ctx.fill();

    // Shine
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(13, -7, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Beak
  ctx.fillStyle = '#ff6600';
  ctx.beginPath();
  ctx.moveTo(14, -2);
  ctx.lineTo(22, 0);
  ctx.lineTo(14, 4);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.col;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawOverlay() {
  if (state === 'idle') {
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = 'rgba(255,221,0,0.15)';
    roundRect(ctx, W/2 - 130, H/2 - 90, 260, 170, 18);
    ctx.fill();
    ctx.strokeStyle = '#ffdd00';
    ctx.lineWidth = 3;
    roundRect(ctx, W/2 - 130, H/2 - 90, 260, 170, 18);
    ctx.stroke();

    ctx.fillStyle = '#ffdd00';
    ctx.font = 'bold 30px "Comic Sans MS", cursive';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#ff6600';
    ctx.shadowBlur = 10;
    ctx.fillText('MONNY BIRD', W / 2, H / 2 - 42);
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#fff';
    ctx.font = '18px "Comic Sans MS", cursive';
    ctx.fillText('Tap or press SPACE', W / 2, H / 2 + 2);
    ctx.fillText('to start!', W / 2, H / 2 + 28);

    ctx.font = '14px "Comic Sans MS", cursive';
    ctx.fillStyle = '#ffaa44';
    ctx.fillText('Best: ' + best, W / 2, H / 2 + 62);
  }

  if (state === 'dead') {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = 'rgba(26,10,46,0.92)';
    roundRect(ctx, W/2 - 130, H/2 - 100, 260, 190, 18);
    ctx.fill();
    ctx.strokeStyle = '#ff3300';
    ctx.lineWidth = 3;
    roundRect(ctx, W/2 - 130, H/2 - 100, 260, 190, 18);
    ctx.stroke();

    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff3300';
    ctx.font = 'bold 32px "Comic Sans MS", cursive';
    ctx.shadowColor = '#ff0000';
    ctx.shadowBlur = 12;
    ctx.fillText('GAME OVER', W / 2, H / 2 - 52);
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#ffdd00';
    ctx.font = '22px "Comic Sans MS", cursive';
    ctx.fillText('Score: ' + score, W / 2, H / 2 - 10);

    ctx.fillStyle = score >= best ? '#66ff88' : '#ffaa44';
    ctx.font = '18px "Comic Sans MS", cursive';
    ctx.fillText('Best: ' + best, W / 2, H / 2 + 22);

    if (score >= best && score > 0) {
      ctx.fillStyle = '#66ff88';
      ctx.font = 'bold 16px "Comic Sans MS", cursive';
      ctx.fillText('🏆 NEW BEST! 🏆', W / 2, H / 2 + 50);
    }

    ctx.fillStyle = '#fff';
    ctx.font = '15px "Comic Sans MS", cursive';
    ctx.fillText('Tap to play again', W / 2, H / 2 + 78);
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  pipes.forEach(drawPipe);
  drawGround();
  if (state !== 'dead' || particles.length > 0) drawBird();
  drawParticles();
  drawOverlay();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBtn').style.display = 'inline-block';
});
document.getElementById('installBtn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('installBtn').style.display = 'none';
});

initStars();
resetBird();
updateUI();
loop();
</script>
</body>
</html>
